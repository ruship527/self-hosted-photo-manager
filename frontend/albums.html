<!DOCTYPE html>
<html>
<head>
    <title>Albums</title>
    <style>

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: #374151;
        }

        .nav-links a.active {
            background: #2563eb;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f3f4f6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .albums {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .album-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .album-card a {
            text-decoration: none;
            color: #111827;
            font-weight: bold;
            font-size: 18px;
        }

        .delete-btn {
            background: #dc2626;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Homelab Drive</div>

    <div class="nav-links">
        <a href="/gallery">Photos</a>
        <a href="/files-page">Files</a>
        <a href="/albums" class="active">Albums</a>
    </div>
</nav>

<h1>Albums</h1>

<div class="form-box">
    <form action="/albums/create" method="post">
        <input type="text" name="name" placeholder="Album name" required>
        <button type="submit">Create Album</button>
    </form>
</div>

<div class="albums">
    {% for album in albums %}
    <div class="album-card">
        <a href="/albums/{{ album.id }}">{{ album.name }}</a>

        <form action="/albums/{{ album.id }}/delete" method="post">
            <button class="delete-btn" type="submit">Delete Album</button>
        </form>
    </div>
    {% endfor %}
</div>

</body>
</html>
