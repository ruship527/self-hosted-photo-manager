<!DOCTYPE html>
<html>
<head>
    <title>{{ album.name }}</title>
    <style>
        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: #374151;
        }

        .nav-links a.active {
            background: #2563eb;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f3f4f6;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111827;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
        }

        button {
            margin-top: 10px;
            padding: 9px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background: #2563eb;
        }

        .remove {
            background: #dc2626;
        }

        .section {
            margin-top: 35px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 40px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .modal img {
            display: block;
            margin: auto;
            max-width: 90%;
            max-height: 85%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Homelab Drive</div>

    <div class="nav-links">
        <a href="/gallery">Photos</a>
        <a href="/files-page">Files</a>
        <a href="/albums" class="active">Albums</a>
    </div>
</nav>

<h1>{{ album.name }}</h1>

<div class="section">
    <h2>Photos in this album</h2>

    <div class="gallery">
        {% for photo in album_photos %}
        <div class="card">
            <img src="/uploads/photos/{{ photo.saved_filename }}" onclick="openModal(this.src)">
                <p>{{ photo.saved_filename }}</p>

            <form action="/albums/{{ album.id }}/remove/{{ photo.id }}" method="post">
                <button class="remove" type="submit">Remove</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>

<div class="section">
    <h2>Add photos</h2>

    <div class="gallery">
        {% for photo in photos %}
            {% if photo.id not in album_photo_ids %}
            <div class="card">
                <img src="/uploads/photos/{{ photo.saved_filename }}" onclick="openModal(this.src)">
                <p>{{ photo.saved_filename }}</p>

                <form action="/albums/{{ album.id }}/add/{{ photo.id }}" method="post">
                    <button type="submit">Add to Album</button>
                </form>
            </div>
            {% endif %}
        {% endfor %}
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImage">
</div>

<script>
    function openModal(src) {
        document.getElementById("imageModal").style.display = "block";
        document.getElementById("modalImage").src = src;
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }
</script>

</body>
</html>
