<!DOCTYPE html>
<html>
<head>
    <title>Homelab Photo App</title>
    <style>
        .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111827;
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    margin-bottom: 25px;
}

#dropZone {
    border: 2px dashed #2563eb;
    padding: 30px;
    text-align: center;
    border-radius: 12px;
    margin: 20px 0;
    color: #2563eb;
    font-weight: bold;
}

#dropZone.dragover {
    background: #eff6ff;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 6px;
}

.nav-links a:hover {
    background: #374151;
}

.nav-links a.active {
    background: #2563eb;
}

.nav-links a:hover {
    text-decoration: underline;
}
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
        .card {
            min-height: 260px;
        }

        button {
            margin-top: 10px;
            cursor: pointer;
        }

        .controls {
            margin-bottom: 20px;
        }

        input[type="text"] {
            margin-top: 10px;
            padding: 5px;
            width: 250px;
        }
        .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 90%;
    max-height: 90%;
    width: auto;
    height: auto;
    object-fit: contain;
}

.close {
    color: white;
    font-size: 40px;
    position: absolute;
    top: 20px;
    right: 40px;
    cursor: pointer;
}
.card div {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.card button {
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    z-index: 999;
    inset: 0;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 14px;
    width: 90%;
    max-width: 500px;
    text-align: center;
}

.details-img {
    max-width: 100%;
    max-height: 350px;
    object-fit: contain;
    border-radius: 10px;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}

.btn {
    display: inline-block;
    padding: 10px 14px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin: 8px;
}

.delete-btn {
    padding: 10px 14px;
    background: #dc2626;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
    </style>
</head>

<body>
    <nav class="navbar">
    <div class="logo">Homelab Drive</div>

    <div class="nav-links">
        <a href="/gallery" class="active">Photos</a>
        <a href="/files-page">Files</a>
        <a href="/albums">Albums</a>
    </div>
</nav>
    <h1>Photos</h1>

    <div id="dropZone">
    Drop photos or files here to upload
</div>

    <div class="controls">
        <input type="file" id="fileInput">
        <button onclick="uploadPhoto()">Upload</button>   <button onclick="downloadSelected()">Download Selected</button> <button onclick="deleteSelected()">Delete Selected</button>
        <p id="downloadStatus"></p>


        <p id="status"></p>

        <progress id="uploadProgress" value="0" max="100" style="display:none; width:100%;"></progress>

        <input type="text" id="searchInput" placeholder="Search filename">
        <button onclick="fetchPhotos()">Search</button>

        <br><br>

        <input type="date" id="dateInput">
        <button onclick="fetchPhotos()">Filter by Date</button>
        <button onclick="clearFilters()">Clear</button>
    </div>

    <div id="statsBox" style="margin-bottom:20px; padding:15px; border:1px solid #ddd; border-radius:10px;">
    <h3>Storage Stats</h3>
    <p id="statsContent">Loading...</p>
    </div>

    <div class="gallery" id="gallery"></div>
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img id="modalImage">
    </div>

    <div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePhotoDetails()">×</span>

        <img id="detailsImage" class="details-img">

        <h3 id="detailsFilename"></h3>

        <p><b>Taken:</b> <span id="detailsTaken"></span></p>
        <p><b>Uploaded:</b> <span id="detailsUploaded"></span></p>
        <p><b>Tags:</b> <span id="detailsTags"></span></p>

        <a id="detailsDownload" class="btn" download>Download</a>
        <button id="detailsDelete" class="delete-btn">Delete</button>
    </div>
</div>

    <script>
    const API_URL = "";

    function openModal(imageUrl) {
        document.getElementById("modalImage").src = imageUrl;
        document.getElementById("imageModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }

    async function fetchPhotos() {
        const search = document.getElementById("searchInput").value || "";
        const date = document.getElementById("dateInput").value || "";

        const response = await fetch(
            `${API_URL}/photos?search=${encodeURIComponent(search)}&date=${encodeURIComponent(date)}&show_tags=true`
        );

        const photos = await response.json();

        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        photos.forEach(photo => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <input type="checkbox" value="${photo.filename}" class="select-photo">

                <img class="photo-img" src="${API_URL}${photo.url}">

                <p><b>Filename:</b> ${photo.filename}</p>
                <p><b>Taken:</b> ${photo.taken_date || "Unknown"}</p>

                <div>
                    <a href="${API_URL}${photo.url}" download>
                        <button>Download</button>
                    </a>
                    <button class="delete-photo-btn">Delete</button>
                </div>
            `;

            const img = card.querySelector(".photo-img");
            img.addEventListener("click", function () {
                openPhotoDetails(
                    photo.filename,
                    API_URL + photo.url,
                    photo.taken_date,
                    photo.upload_date,
                    photo.tags || []
                );
            });

            const deleteBtn = card.querySelector(".delete-photo-btn");
            deleteBtn.addEventListener("click", function () {
                deletePhoto(photo.filename);
            });

            gallery.appendChild(card);
        });
    }

    function clearFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("dateInput").value = "";
        fetchPhotos();
    }

    async function loadStats() {
    const res = await fetch(`${API_URL}/stats`);
    const data = await res.json();

    const mb = (data.total_size / (1024 * 1024)).toFixed(2);

    document.getElementById("statsContent").innerHTML = `
        Photos: ${data.total_photos}<br>
        Files: ${data.total_files}<br>
        Storage Used: ${mb} MB<br>
        Largest File: ${data.largest_file.name || "None"}
    `;
}

    async function uploadPhoto() {
        const input = document.getElementById("fileInput");
        const status = document.getElementById("status");
        const file = input.files[0];

        if (!file) {
            alert("Choose a photo first");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        status.textContent = "Uploading...";
        document.body.style.cursor = "wait";

        const response = await fetch(`${API_URL}/photos/upload`, {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        document.body.style.cursor = "default";
        input.value = "";

        if (result.message === "Duplicate image") {
            status.textContent = `Duplicate photo. Already saved as ${result.filename}`;
        } else {
            status.textContent = "Upload successful.";
        }

        await fetchPhotos();
    }

    async function deletePhoto(filename) {
        if (!confirm("Delete this photo?")) return;

        await fetch(`${API_URL}/photos/${encodeURIComponent(filename)}`, {
            method: "DELETE"
        });

        await fetchPhotos();
    }

    function getSelectedPhotos() {
        return Array.from(document.querySelectorAll(".select-photo:checked"))
            .map(cb => cb.value);
    }

    async function deleteSelected() {
        const selected = getSelectedPhotos();

        if (selected.length === 0) {
            alert("Select at least one photo");
            return;
        }

        for (const filename of selected) {
            await fetch(`${API_URL}/photos/${encodeURIComponent(filename)}`, {
                method: "DELETE"
            });
        }

        await fetchPhotos();
    }

    async function downloadSelected() {
        const selected = getSelectedPhotos();

        if (selected.length === 0) {
            alert("Select photos first");
            return;
        }

        document.getElementById("downloadStatus").textContent = "Preparing download...";
        document.body.style.cursor = "wait";

        const res = await fetch(`${API_URL}/photos/download-zip`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(selected)
        });

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "photos.zip";
        a.click();

        window.URL.revokeObjectURL(url);

        document.getElementById("downloadStatus").textContent = "";
        document.body.style.cursor = "default";
    }

    function openPhotoDetails(filename, url, takenDate, uploadDate, tags) {
        document.getElementById("detailsImage").src = url;
        document.getElementById("detailsFilename").innerText = filename;
        document.getElementById("detailsTaken").innerText = takenDate || "Unknown";
        document.getElementById("detailsUploaded").innerText = uploadDate || "Unknown";

        document.getElementById("detailsTags").innerText =
            tags && tags.length > 0 ? tags.join(", ") : "No tags";

        document.getElementById("detailsDownload").href = url;
        document.getElementById("detailsDownload").download = filename;

        document.getElementById("detailsDelete").onclick = function () {
            deletePhoto(filename);
            closePhotoDetails();
    };

    document.getElementById("detailsModal").style.display = "flex";
}

    function closePhotoDetails() {
        document.getElementById("detailsModal").style.display = "none";
    }

    const dropZone = document.getElementById("dropZone");

    dropZone.addEventListener("drop", async function (e) {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    const status = document.getElementById("status");
    const progress = document.getElementById("uploadProgress");

    status.textContent = "Uploading...";
    document.body.style.cursor = "wait";

    progress.style.display = "block";
    progress.value = 0;

    const total = files.length;

    for (let i = 0; i < total; i++) {
        const file = files[i];

        const formData = new FormData();
        formData.append("file", file);

        await fetch(`${API_URL}/photos/upload`, {
            method: "POST",
            body: formData
        });

        const percent = Math.round(((i + 1) / total) * 100);
        progress.value = percent;
    }

    status.textContent = "Upload complete.";
    document.body.style.cursor = "default";

    await fetchPhotos();

    progress.style.display = "none";
});

fetchPhotos();
loadStats();
</script>
</body>
</html>
